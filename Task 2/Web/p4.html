<!DOCTYPE html>
<html>
<head>
    <title>Sum of Product of Digits</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
            width:350px;
        }

        h2{
            color:#1f3c88;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#1f3c88;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:5px;
            margin-top:10px;
        }

        button:hover{
            background:#16328c;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Sum of Product of Digits</h2>

        <input type="number" id="num1" placeholder="Enter First Number">

        <input type="number" id="num2" placeholder="Enter Second Number">

        <button onclick="calculate()">
            Calculate
        </button>

        <div id="result"></div>

    </div>

    <script>

        function sumOfProductOfDigits(n1, n2) {

            let sum = 0;

            while (n1 > 0 || n2 > 0) {

                let digit1 = n1 % 10;
                let digit2 = n2 % 10;

                sum += digit1 * digit2;

                n1 = Math.floor(n1 / 10);
                n2 = Math.floor(n2 / 10);
            }

            return sum;
        }

        function calculate() {

            let n1 = parseInt(document.getElementById("num1").value);
            let n2 = parseInt(document.getElementById("num2").value);

            let answer = sumOfProductOfDigits(n1, n2);

            document.getElementById("result").innerHTML =
                "Result = " + answer;
        }

    </script>

</body>
</html>
