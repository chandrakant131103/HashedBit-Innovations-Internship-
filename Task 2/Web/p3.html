<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Tax Calculator</h2>

        <input type="number" id="salary" placeholder="Enter Salary">

        <br>

        <button onclick="calculateTax()">Calculate Tax</button>

        <div id="result"></div>
    </div>

    <script>
        function findTax(salary) {
            let taxAmount = 0;

            switch (true) {
                case (salary > 0 && salary <= 500000):
                    taxAmount = 0;
                    break;

                case (salary > 500000 && salary <= 1000000):
                    taxAmount = salary * 0.10;
                    break;

                case (salary > 1000000 && salary <= 1500000):
                    taxAmount = salary * 0.20;
                    break;

                case (salary > 1500000):
                    taxAmount = salary * 0.30;
                    break;

                default:
                    return "Invalid salary input. Please enter a number greater than 0.";
            }

            return taxAmount;
        }

        function calculateTax() {
            const salary = Number(document.getElementById("salary").value);
            const tax = findTax(salary);

            document.getElementById("result").innerHTML =
                typeof tax === "number"
                    ? `Tax Amount: ₹${tax}`
                    : tax;
        }
    </script>

</body>
</html>
