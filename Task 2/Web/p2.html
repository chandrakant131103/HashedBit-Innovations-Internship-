<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            color:#1f3c88;
            margin-bottom:20px;
        }

        input,
        select{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#1f3c88;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#16328c;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Simple Calculator</h2>

        <input type="number" id="num1" placeholder="Enter First Number">

        <input type="number" id="num2" placeholder="Enter Second Number">

        <select id="operator">
            <option value="+">Addition (+)</option>
            <option value="-">Subtraction (-)</option>
            <option value="*">Multiplication (*)</option>
            <option value="/">Division (/)</option>
        </select>

        <button onclick="findResult()">
            Calculate
        </button>

        <div id="result"></div>

    </div>

    <script>

        function calculate(num1, num2, operator) {

            let result;

            switch(operator){

                case '+':
                    result = num1 + num2;
                    break;

                case '-':
                    result = num1 - num2;
                    break;

                case '*':
                    result = num1 * num2;
                    break;

                case '/':

                    if(num2 === 0){
                        return "Error: Cannot divide by zero";
                    }

                    result = num1 / num2;
                    break;

                default:
                    return "Invalid Operator";
            }

            return result;
        }

        function findResult(){

            let num1 = parseFloat(
                document.getElementById("num1").value
            );

            let num2 = parseFloat(
                document.getElementById("num2").value
            );

            let operator =
                document.getElementById("operator").value;

            let answer =
                calculate(num1, num2, operator);

            document.getElementById("result").innerHTML =
                "Result = " + answer;
        }

    </script>

</body>
</html>
