<!DOCTYPE html>
<html>
<head>
    <title>Student Average Calculator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
        }

        .container{
            width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }

        h1{
            color: #333;
            margin-bottom: 20px;
        }

        button{
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button:hover{
            background-color: darkgreen;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Student Average Marks</h1>

        <button onclick="calculateAverage()">
            Calculate Averages
        </button>

        <table id="resultTable">
            <tr>
                <th>Student Name</th>
                <th>Average Marks</th>
            </tr>
        </table>

    </div>

    <script>

        const students = [
            { name: "Ram", scores: [80, 70, 60] },
            { name: "Mohan", scores: [80, 70, 90] },
            { name: "Sai", scores: [60, 70, 80] },
            { name: "Hemang", scores: [90, 90, 80, 80] }
        ];

        function calculateAverage(){

            const studentAverages =
                students.map(function(student){

                    const totalScore =
                        student.scores.reduce(
                            (sum, score) => sum + score,
                            0
                        );

                    return {
                        name: student.name,
                        average:
                            totalScore /
                            student.scores.length
                    };
                });

            let table =
                document.getElementById("resultTable");

            table.innerHTML =
            `
            <tr>
                <th>Student Name</th>
                <th>Average Marks</th>
            </tr>
            `;

            studentAverages.forEach(function(student){

                table.innerHTML +=
                `
                <tr>
                    <td>${student.name}</td>
                    <td>${student.average}</td>
                </tr>
                `;
            });
        }

    </script>

</body>
</html>
