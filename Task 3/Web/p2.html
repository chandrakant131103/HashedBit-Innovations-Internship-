<!DOCTYPE html>
<html>
<head>
    <title>Reverse Words</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        .container{
            width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }

        h1{
            color: #333;
            margin-bottom: 20px;
        }

        button{
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkgreen;
        }

        p{
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Reverse Words in a Sentence</h1>

        <button onclick="reverseSentence()">
            Reverse Sentence
        </button>

        <p id="original"></p>
        <p id="result"></p>

    </div>

    <script>

        function reverseSentence(){

            let str = "I love my India";

            let reversedStr =
                str.split(" ")
                   .reverse()
                   .join(" ");

            document.getElementById("original").innerHTML =
                "<strong>Original:</strong> " + str;

            document.getElementById("result").innerHTML =
                "<strong>Reversed:</strong> " + reversedStr;
        }

    </script>

</body>
</html>
