<!DOCTYPE html>
<html>
<head>
    <title>Filter Numbers Greater Than 5</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        .container{
            width: 650px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }

        h1{
            color: #333;
            margin-bottom: 20px;
        }

        button{
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkgreen;
        }

        p{
            font-size: 18px;
            margin-top: 15px;
        }

        .result{
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Filter Numbers Greater Than 5</h1>

        <p id="inputArray"></p>

        <button onclick="filterNumbers()">
            Filter Numbers
        </button>

        <p id="output" class="result"></p>

    </div>

    <script>

        const inputArr =
        [1, 2, 3, 9, 10, 7, 5, 4, 3];

        document.getElementById("inputArray").innerHTML =
            "<strong>Input Array:</strong> " +
            inputArr.join(", ");

        function filterNumbers(){

            const result =
                inputArr.filter(function(num){
                    return num > 5;
                });

            document.getElementById("output").innerHTML =
                "Numbers Greater Than 5: " +
                result.join(", ");
        }

    </script>

</body>
</html>
