<!DOCTYPE html>
<html>
<head>
    <title>String Reverser</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        .container{
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }

        h1{
            color: #333;
        }

        input{
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            font-size: 16px;
        }

        button{
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }

        #result{
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>String Reverser</h1>

        <input
            type="text"
            id="textInput"
            placeholder="Enter a String"
        >

        <br>

        <button onclick="reverseText()">
            Reverse String
        </button>

        <div id="result"></div>

    </div>

    <script>

        function reverseString(str){

            return str
                .split("")
                .reverse()
                .join("");
        }

        function reverseText(){

            let text =
                document.getElementById("textInput").value;

            let reversed =
                reverseString(text);

            document.getElementById("result").innerHTML =
                "Reversed String: " + reversed;
        }

    </script>

</body>
</html>
